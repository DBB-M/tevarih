---
layout: default
custom-foot: js/item-js.html;js/modal-hash-js.html
gallery: true
---
<div class="container py-4">

  <nav aria-label="breadcrumb" style="margin-bottom:1rem;">
    <ol class="breadcrumb" style="background:#f2ead8;border-radius:4px;padding:.5rem 1rem;border:1px solid #d0b878;font-size:.85rem;">
      <li class="breadcrumb-item"><a href="{{ '/' | relative_url }}" style="color:#b8960c;">{{ site.title }}</a></li>
      <li class="breadcrumb-item"><a href="{{ '/browse.html' | relative_url }}" style="color:#b8960c;">Keşfet</a></li>
      <li id="bc-title" class="breadcrumb-item active" style="color:#4a2e0a;" aria-current="page"></li>
    </ol>
  </nav>

  <div id="loading" class="text-center py-5">
    <div class="spinner-border" role="status" style="color:#b8960c;"><span class="visually-hidden">Yükleniyor...</span></div>
  </div>

  <div class="row g-4">

    <div class="col-12">
      <div style="font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:#a08050;" id="item-format"></div>
      <h2 id="item-title" style="font-family:'EB Garamond',Georgia,serif;color:#2a1f0e;font-size:1.8rem;margin:.2rem 0 1rem;line-height:1.25;"></h2>
    </div>

    <div class="col-md-8">
      <div id="item-content"></div>
      <div id="item-metadata" style="margin-top:1rem;"></div>
    </div>

    <div class="col-md-4">
      <div id="item-actions" style="background:#f2ead8;border:1px solid #d0b878;border-radius:8px;padding:1.2rem;position:sticky;top:1rem;">
        <div style="font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:#a08050;margin-bottom:.8rem;">Bağlantılar</div>
        <div id="browse-buttons" style="display:flex;flex-direction:column;gap:.5rem;">
          <a class="btn btn-primary btn-sm" href="{{ '/browse.html' | relative_url }}">← Keşfet'e Dön</a>
        </div>
      </div>
    </div>

  </div>

  <div id="item-nav"></div>

</div>
